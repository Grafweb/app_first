<!-- 3 featured news articles -->
<div class="mt-12">
  <div class="flex justify-between items-center mb-6">
    <h2 class="text-2xl font-bold">Latest News</h2>
    <a href="{% url 'article_list' %}" class="text-blue-400 hover:underline text-sm">View all &rarr;</a>
  </div>
  {% if news_articles %}
  <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
    {% for article in news_articles %}
    <a href="{{ article.get_absolute_url }}" class="group bg-gray-800 rounded-xl overflow-hidden hover:ring-2 hover:ring-blue-500 transition">
      {% if article.thumbnail %}
      <img
        src="{{ article.thumbnail.url }}"
        alt="{{ article.title }}"
        class="w-full h-40 object-cover group-hover:opacity-90 transition"
      />
      {% else %}
      <div class="w-full h-40 bg-gray-700 flex items-center justify-center">
        <span class="text-gray-500 text-3xl">&#128240;</span>
      </div>
      {% endif %}
      <div class="p-4">
        <p class="text-xs text-blue-400 font-medium mb-1">{{ article.published_date|date:"F j, Y" }}</p>
        <h3 class="font-bold group-hover:text-blue-400 transition line-clamp-2">{{ article.title }}</h3>
        <p class="text-gray-400 text-sm mt-1 line-clamp-2">{{ article.excerpt }}</p>
      </div>
    </a>
    {% endfor %}
  </div>
  {% else %}
  <p class="text-gray-400">No news articles available.</p>
  {% endif %}
</div>
